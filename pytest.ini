[pytest]
testpaths = sidecar/tests tests
norecursedirs = .git .pytest_cache .ruff_cache node_modules dist build tmp src-tauri/target
asyncio_default_fixture_loop_scope = function
addopts = --strict-markers --strict-config --tb=short -ra --durations=15 --timeout=30 -m "not performance"
xfail_strict = true
markers =
    unit: isolated, fast component tests
    integration: tests crossing component, API, database, or service boundaries
    security: adversarial, authorization, ACL, and trust-boundary tests
    e2e: complete user or orchestration flows
    performance: benchmarks that intentionally repeat comparatively expensive operations
