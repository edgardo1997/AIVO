name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check --output-format=github .

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration, security, e2e]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: sidecar/requirements-dev.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sidecar/requirements-dev.txt

      - name: Run ${{ matrix.suite }} suite with coverage
        run: |
          python -m pytest -m "${{ matrix.suite }}" \
            --junitxml="pytest-${{ matrix.suite }}.xml" \
            --cov=sentinel.core.orchestrator \
            --cov=sentinel.core.tool_gateway \
            --cov=sentinel.core.model_router \
            --cov=sentinel.core.operational_memory \
            --cov-report=term-missing \
            --cov-report="xml:coverage-${{ matrix.suite }}.xml"

      - name: Upload deterministic test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.suite }}-evidence
          path: |
            pytest-${{ matrix.suite }}.xml
            coverage-${{ matrix.suite }}.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-${{ matrix.suite }}.xml
          flags: ${{ matrix.suite }}
          fail_ci_if_error: false

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with oxlint
        run: npx oxlint@latest

  frontend-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run --reporter=verbose
